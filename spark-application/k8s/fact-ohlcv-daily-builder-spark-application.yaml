apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: fact-ohlcv-daily-builder
  namespace: stock-anomaly-detection
spec:
  type: Scala
  mode: cluster
  image: "hungvt0110/fact-ohlcv-daily-builder:v0.1"
  imagePullPolicy: Always
  mainClass: com.stockanomalydetection.factohlcv.FactOhlcvDailyBuilder
  mainApplicationFile: "local:///opt/spark/jars/fact-ohlcv-daily-builder-assembly-1.0.0.jar"
  sparkVersion: "3.5.1"

  sparkConf:
    # -------------------------------------------------------------------------
    # 1) SQL extensions and catalog routing
    # -------------------------------------------------------------------------
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    "spark.sql.catalog.spark_catalog": "org.apache.iceberg.spark.SparkSessionCatalog"
    "spark.sql.catalog.spark_catalog.type": "in-memory"
    "spark.sql.defaultCatalog": "gravitino_catalog"

    # -------------------------------------------------------------------------
    # 2) Spark execution tuning
    # -------------------------------------------------------------------------
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.adaptive.advisoryPartitionSizeInBytes": "134217728"
    # Higher parallelism — 500 symbols × 20yr × Window functions are shuffle-heavy
    "spark.sql.shuffle.partitions": "32"
    "spark.default.parallelism": "16"

    # -------------------------------------------------------------------------
    # 3) Iceberg write behaviour
    # -------------------------------------------------------------------------
    "spark.sql.iceberg.distribution-mode": "hash"
    "spark.sql.iceberg.advisory-partition-size": "134217728"
    "spark.sql.iceberg.dynamic-partition-overwrite.enabled": "true"

    # -------------------------------------------------------------------------
    # 4) S3A / MinIO filesystem
    # -------------------------------------------------------------------------
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"

    # -------------------------------------------------------------------------
    # 5) Data quality compatibility
    # -------------------------------------------------------------------------
    "spark.sql.iceberg.check-nullability": "false"

  restartPolicy:
    type: Never

  driver:
    cores: 2
    memory: "4g"
    memoryOverhead: "1g"
    serviceAccount: spark
    env:
      - name: GRAVITINO_URI
        value: "http://openhouse-gravitino:9001"
      - name: MINIO_ENDPOINT
        value: "http://openhouse-minio:9000"
      - name: ICEBERG_WAREHOUSE
        value: "gold"
      - name: GRAVITINO_OAUTH_SERVER_URI
        value: "http://openhouse-keycloak"
      - name: GRAVITINO_OAUTH_TOKEN_PATH
        value: "realms/iceberg/protocol/openid-connect/token"
      - name: GRAVITINO_OAUTH_SCOPE
        value: "gravitino"
      - name: INPUT_TABLE
        value: "gravitino_catalog.normalized.ohlcv_daily"
      - name: DIM_SYMBOL_TABLE
        value: "gravitino_catalog.gold.dim_symbol"
      - name: DIM_DATE_TABLE
        value: "gravitino_catalog.gold.dim_date"
      - name: OUTPUT_TABLE
        value: "gravitino_catalog.gold.fact_ohlcv_daily"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: GRAVITINO_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: GRAVITINO_OAUTH_CLIENT_SECRET
    labels:
      app.kubernetes.io/component: driver
      app.kubernetes.io/name: fact-ohlcv-daily-builder

  executor:
    instances: 2
    cores: 4
    memory: "6g"
    memoryOverhead: "1g"
    env:
      - name: GRAVITINO_URI
        value: "http://openhouse-gravitino:9001"
      - name: MINIO_ENDPOINT
        value: "http://openhouse-minio:9000"
      - name: ICEBERG_WAREHOUSE
        value: "gold"
      - name: GRAVITINO_OAUTH_SERVER_URI
        value: "http://openhouse-keycloak"
      - name: GRAVITINO_OAUTH_TOKEN_PATH
        value: "realms/iceberg/protocol/openid-connect/token"
      - name: GRAVITINO_OAUTH_SCOPE
        value: "gravitino"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: GRAVITINO_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: GRAVITINO_OAUTH_CLIENT_SECRET
    labels:
      app.kubernetes.io/component: executor
      app.kubernetes.io/name: fact-ohlcv-daily-builder
