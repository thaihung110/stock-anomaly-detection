apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: trades-ohlcv-stream
  namespace: stock-anomaly-detection
spec:
  type: Scala
  mode: cluster
  image: "hungvt0110/trades-ohlcv-stream:v1.2"
  imagePullPolicy: Always
  mainClass: com.stockanomalydetection.tradesohlcv.TradesOhlcvStream
  mainApplicationFile: "local:///opt/spark/jars/trades-ohlcv-stream-assembly-1.0.0.jar"
  sparkVersion: "3.5.1"

  sparkConf:
    # -------------------------------------------------------------------------
    # 1) SQL extensions and catalog routing
    # -------------------------------------------------------------------------
    # Iceberg Spark SQL extension (required for Iceberg SQL features)
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    # Use Iceberg session catalog instead of Hive metastore-backed spark_catalog.
    "spark.sql.catalog.spark_catalog": "org.apache.iceberg.spark.SparkSessionCatalog"
    "spark.sql.catalog.spark_catalog.type": "in-memory"
    # Make gravitino_silver the default.
    "spark.sql.defaultCatalog": "gravitino_silver"

    # -------------------------------------------------------------------------
    # 2) Spark execution tuning
    # -------------------------------------------------------------------------
    # Adaptive Query Execution
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.coalescePartitions.enabled": "true"
    "spark.sql.adaptive.advisoryPartitionSizeInBytes": "134217728"
    # Baseline parallelism for small cluster
    "spark.sql.shuffle.partitions": "4"
    "spark.default.parallelism": "2"

    # -------------------------------------------------------------------------
    # 3) Iceberg write behavior
    # -------------------------------------------------------------------------
    "spark.sql.iceberg.distribution-mode": "hash"
    "spark.sql.iceberg.advisory-partition-size": "134217728"

    # -------------------------------------------------------------------------
    # 4) Streaming state/reliability
    # -------------------------------------------------------------------------
    "spark.streaming.stopGracefullyOnShutdown": "true"
    "spark.sql.streaming.stateStore.providerClass": "org.apache.spark.sql.execution.streaming.state.RocksDBStateStoreProvider"
    "spark.sql.streaming.stateStore.rocksdb.compactOnCommit": "true"
    "spark.sql.streaming.minBatchesToRetain": "5"

    # -------------------------------------------------------------------------
    # 5) S3A / MinIO filesystem
    # -------------------------------------------------------------------------
    "spark.hadoop.fs.s3a.path.style.access": "true"
    "spark.hadoop.fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "spark.hadoop.fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"

    # -------------------------------------------------------------------------
    # 6) Data quality compatibility
    # -------------------------------------------------------------------------
    "spark.sql.iceberg.check-nullability": "false"

  restartPolicy:
    type: OnFailure
    onFailureRetries: 10
    onFailureRetryInterval: 10

  driver:
    cores: 1
    memory: "512m"
    memoryOverhead: "384m"
    serviceAccount: spark
    env:
      - name: GRAVITINO_URI
        value: "http://openhouse-gravitino:9001"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "openhouse-kafka:9092"
      - name: MINIO_ENDPOINT
        value: "http://openhouse-minio:9000"
      - name: CHECKPOINT_LOCATION
        value: "s3a://checkpoints/trades-ohlcv-stream"
      - name: KAFKA_MAX_OFFSETS_PER_TRIGGER
        value: "20000"
      - name: ICEBERG_WRITE_DISTRIBUTION_MODE
        value: "hash"
      - name: ICEBERG_TARGET_FILE_SIZE_BYTES
        value: "134217728"
      - name: ICEBERG_FANOUT_ENABLED
        value: "false"
      - name: GRAVITINO_OAUTH_SERVER_URI
        value: "http://openhouse-keycloak"
      - name: GRAVITINO_OAUTH_TOKEN_PATH
        value: "realms/iceberg/protocol/openid-connect/token"
      - name: GRAVITINO_OAUTH_SCOPE
        value: "gravitino"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: GRAVITINO_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: GRAVITINO_OAUTH_CLIENT_SECRET
    labels:
      app.kubernetes.io/component: driver
      app.kubernetes.io/name: trades-ohlcv-stream

  executor:
    instances: 1
    cores: 1
    memory: "1g"
    memoryOverhead: "512m"
    env:
      - name: GRAVITINO_URI
        value: "http://openhouse-gravitino:9001"
      - name: KAFKA_BOOTSTRAP_SERVERS
        value: "openhouse-kafka:9092"
      - name: MINIO_ENDPOINT
        value: "http://openhouse-minio:9000"
      - name: CHECKPOINT_LOCATION
        value: "s3a://checkpoints/trades-ohlcv-stream"
      - name: KAFKA_MAX_OFFSETS_PER_TRIGGER
        value: "20000"
      - name: ICEBERG_WRITE_DISTRIBUTION_MODE
        value: "hash"
      - name: ICEBERG_TARGET_FILE_SIZE_BYTES
        value: "134217728"
      - name: ICEBERG_FANOUT_ENABLED
        value: "false"
      - name: GRAVITINO_OAUTH_SERVER_URI
        value: "http://openhouse-keycloak"
      - name: GRAVITINO_OAUTH_TOKEN_PATH
        value: "realms/iceberg/protocol/openid-connect/token"
      - name: GRAVITINO_OAUTH_SCOPE
        value: "gravitino"
      - name: MINIO_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: MINIO_SECRET_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: MINIO_SECRET_KEY
      - name: GRAVITINO_OAUTH_CLIENT_SECRET
        valueFrom:
          secretKeyRef:
            name: spark-app-secrets
            key: GRAVITINO_OAUTH_CLIENT_SECRET
    labels:
      app.kubernetes.io/component: executor
      app.kubernetes.io/name: trades-ohlcv-stream
