apiVersion: v1
kind: Secret
metadata:
  name: finnhub-api-secret
  namespace: default
type: Opaque
stringData:
  FINNHUB_API_TOKEN: "d51sshpr01qiituquiu0d51sshpr01qiituquiug"
  KAFKA_SASL_USERNAME: "admin"
  KAFKA_SASL_PASSWORD: "admin"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: finnhub-producer-config
  namespace: default
data:
  KAFKA_SERVER: "openhouse-kafka"
  KAFKA_PORT: "9092"
  KAFKA_TOPIC_NAME: "market-data.finnhub.crypto-trades.bronze"
  # Multiple symbols configuration (comma-separated or JSON array)
  FINNHUB_STOCKS_TICKERS: '["BINANCE:BTCUSDT", "BINANCE:ETHUSDT", "BINANCE:BNBUSDT"]'
  FINNHUB_VALIDATE_TICKERS: "0" # Skip validation for crypto symbols
  # Producer configuration
  PRODUCER_ID: "finnhub-producer-k8s-001"
  SCHEMA_VERSION: "1.0.0"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: finnhub-producer
  namespace: default
  labels:
    app: finnhub-producer
    component: data-ingestion
spec:
  replicas: 1 # IMPORTANT: Only 1 replica for Finnhub Free Tier
  strategy:
    type: Recreate # Ensure old pod terminates before new one starts (avoid rate limits)
  selector:
    matchLabels:
      app: finnhub-producer
  template:
    metadata:
      labels:
        app: finnhub-producer
        component: data-ingestion
    spec:
      containers:
        - name: finnhub-producer
          image: hungvt0110/finnhub-producer:latest
          imagePullPolicy: Always
          env:
            - name: FINNHUB_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: finnhub-api-secret
                  key: FINNHUB_API_TOKEN
            - name: KAFKA_SASL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: finnhub-api-secret
                  key: KAFKA_SASL_USERNAME
            - name: KAFKA_SASL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: finnhub-api-secret
                  key: KAFKA_SASL_PASSWORD
            - name: KAFKA_SERVER
              valueFrom:
                configMapKeyRef:
                  name: finnhub-producer-config
                  key: KAFKA_SERVER
            - name: KAFKA_PORT
              valueFrom:
                configMapKeyRef:
                  name: finnhub-producer-config
                  key: KAFKA_PORT
            - name: KAFKA_TOPIC_NAME
              valueFrom:
                configMapKeyRef:
                  name: finnhub-producer-config
                  key: KAFKA_TOPIC_NAME
            - name: FINNHUB_STOCKS_TICKERS
              valueFrom:
                configMapKeyRef:
                  name: finnhub-producer-config
                  key: FINNHUB_STOCKS_TICKERS
            - name: FINNHUB_VALIDATE_TICKERS
              valueFrom:
                configMapKeyRef:
                  name: finnhub-producer-config
                  key: FINNHUB_VALIDATE_TICKERS
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ps aux | grep -v grep | grep python || exit 1"
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "ps aux | grep -v grep | grep python || exit 1"
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      restartPolicy: Always
      # Ensure only one instance runs at a time (avoid rate limits)
      terminationGracePeriodSeconds: 30
