## PodDisruptionBudget configuration
## PodDisruptionBudgets limit the number of pods that can be down simultaneously during voluntary disruptions
## (such as node drains, cluster upgrades, or pod evictions), ensuring high availability and service continuity.
## ref: https://kubernetes.io/docs/tasks/run-application/configure-pdb/
##
podDisruptionBudget:
  ## @param podDisruptionBudget.enabled Enable PodDisruptionBudget creation
  ## Set to true to create a PodDisruptionBudget resource for the Gravitino deployment
  ##
  enabled: false

  ## @param podDisruptionBudget.minAvailable Minimum number/percentage of pods that must remain available
  ## Specify either an integer (e.g., 1, 2) or a percentage string (e.g., "50%")
  ## This ensures at least this many pods stay running during voluntary disruptions
  ##
  ## Examples:
  ##   minAvailable: 1           # At least 1 pod must remain available
  ##   minAvailable: 2           # At least 2 pods must remain available
  ##   minAvailable: "50%"       # At least 50% of pods must remain available
  ##
  ## When to use minAvailable:
  ## - Use when you want to guarantee a minimum number of pods stay running
  ## - Recommended for production deployments to ensure service availability
  ## - With single replica (replicas: 1), minAvailable: 1 prevents all voluntary disruptions
  ## - With multiple replicas, allows disruptions while maintaining minimum availability
  ## - Only used when podDisruptionBudget.enabled: true. Set explicitly when enabling PDB.
  ##
  minAvailable: 1

  ## @param podDisruptionBudget.maxUnavailable Maximum number/percentage of pods that can be unavailable
  ## Specify either an integer (e.g., 1, 2) or a percentage string (e.g., "50%")
  ## This limits how many pods can be down simultaneously during voluntary disruptions
  ##
  ## Examples:
  ##   maxUnavailable: 1         # At most 1 pod can be unavailable
  ##   maxUnavailable: 2         # At most 2 pods can be unavailable
  ##   maxUnavailable: "25%"     # At most 25% of pods can be unavailable
  ##
  ## When to use maxUnavailable:
  ## - Use when you want to control the rate of disruptions
  ## - Useful for rolling updates and gradual scaling operations
  ## - More flexible than minAvailable when scaling up/down
  ##
  ## IMPORTANT: Specify either minAvailable OR maxUnavailable, not both
  ## If both are specified, Kubernetes will reject the PodDisruptionBudget and fail with an API validation error
  ##
  maxUnavailable: ""

  ## @param podDisruptionBudget.labels Additional labels to apply to the PodDisruptionBudget resource
  ## These labels are merged with the default Helm labels
  ##
  labels: {}
  #   custom-label: value

  ## @param podDisruptionBudget.annotations Additional annotations to apply to the PodDisruptionBudget resource
  ## Useful for adding metadata or integration with other tools
  ##
  annotations: {}
  #   custom-annotation: value

## Relationship between PDB and replica count:
## - Single replica (replicas: 1) + minAvailable: 1 = No voluntary disruptions allowed
##   This prevents node drains and upgrades from evicting the only pod
## - Multiple replicas (replicas: 3) + minAvailable: 2 = At least 2 pods must stay running
##   Allows 1 pod to be disrupted at a time for maintenance
## - Multiple replicas (replicas: 3) + maxUnavailable: 1 = At most 1 pod can be down
##   Equivalent to minAvailable: 2 in this case
##
## Best practices:
## - For production: Enable PDB with appropriate minAvailable or maxUnavailable
## - For development/testing: Keep PDB disabled (default) for faster iterations
## - Consider your replica count when setting PDB values
## - Test PDB behavior in staging before applying to production

## ── Extra InitContainers ─────────────────────────────────────────────────────
## Dùng để download các JAR bổ sung cần thiết trước khi Gravitino khởi động.
##
## gravitino-iceberg-aws-bundle: AWS SDK v2 + S3FileIO implementation
## Cần thiết để:
##   1. Gravitino Catalog (lakehouse-iceberg) khởi tạo S3FileIO khi tạo catalog
##   2. Iceberg REST server đọc/ghi data lên S3/MinIO
##
## Flow:
##   initContainer download JAR vào emptyDir volume "aws-libs"
##   → main container mount volume đó vào 2 lib dirs tương ứng
##
extraInitContainers:
  ## ── Init Gravitino schema trên external PostgreSQL ───────────────────────
  ## Cần thiết khi postgresql.enabled: false (dùng external PG thay vì bundled).
  ## Helm chart chỉ chạy init-postgresql khi postgresql.enabled: true.
  ## Container này copy scripts từ sqlfile initContainer (scripts-emptydir)
  ## và chạy schema-*-postgresql.sql vào gravitino_db.
  ## Idempotent: schema file dùng CREATE TABLE IF NOT EXISTS.
  ## ─────────────────────────────────────────────────────────────────────────
  - name: init-external-postgresql-schema
    image: postgres:15-alpine
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "=== Waiting for external PostgreSQL to be ready ==="
        until pg_isready -h openhouse-postgresql-primary -p 5432 -U gravitino; do
          echo "PostgreSQL not ready, retrying in 3s..."
          sleep 3
        done

        VERSION=$(cat /scripts/version.txt)
        if [ -z "$VERSION" ]; then
          echo "ERROR: Could not read Gravitino version from /scripts/version.txt"
          exit 1
        fi
        echo "Gravitino version: $VERSION"

        SCHEMA_FILE="/scripts/postgresql/schema-${VERSION}-postgresql.sql"
        if [ ! -f "$SCHEMA_FILE" ]; then
          echo "ERROR: Schema file not found: $SCHEMA_FILE"
          echo "Available files:"
          ls /scripts/postgresql/ || true
          exit 1
        fi

        echo "=== Running schema: $SCHEMA_FILE ==="
        PGPASSWORD=$POSTGRES_PASSWORD psql \
          -h openhouse-postgresql-primary \
          -p 5432 \
          -U gravitino \
          -d gravitino_db \
          -f "$SCHEMA_FILE"
        echo "=== Schema initialized successfully ==="
    env:
      - name: POSTGRES_PASSWORD
        value: gravitino
    volumeMounts:
      - name: scripts-emptydir
        mountPath: /scripts
        readOnly: true

  - name: download-aws-bundle
    image: curlimages/curl:8.6.0
    command:
      - /bin/sh
      - -c
      - |
        set -e
        BUNDLE_JAR="gravitino-iceberg-aws-bundle-1.1.0.jar"
        MAVEN_URL="https://repo1.maven.org/maven2/org/apache/gravitino/gravitino-iceberg-aws-bundle/1.1.0/${BUNDLE_JAR}"
        TARGET="/aws-libs/${BUNDLE_JAR}"

        if [ -f "$TARGET" ]; then
          echo "JAR already exists, skipping download."
        else
          echo "Downloading ${BUNDLE_JAR} from Maven Central..."
          curl -fSL --retry 3 --retry-delay 5 -o "$TARGET" "$MAVEN_URL"
          echo "Download complete: $(ls -lh $TARGET)"
        fi
    volumeMounts:
      - name: aws-libs
        mountPath: /aws-libs

  ## ── Import Keycloak CA cert vào JVM truststore ────────────────────────────
  ## Cần thiết khi authority dùng HTTPS với self-signed cert của Keycloak.
  ## JVM mặc định không trust self-signed cert → SSLHandshakeException
  ## → JWKS JWT validation error khi fetch OIDC discovery.
  ##
  ## Flow:
  ##   1. Copy cacerts mặc định của JRE (để giữ nguyên các CA public đã có)
  ##   2. Import keycloak CA cert vào copy đó
  ##   3. Lưu vào /truststore/gravitino.jks (shared volume)
  ##   4. Main container dùng -Djavax.net.ssl.trustStore trỏ đến file này
  ## ─────────────────────────────────────────────────────────────────────────
  - name: import-keycloak-cert
    image: eclipse-temurin:11-jre
    command:
      - /bin/sh
      - -c
      - |
        set -e
        JKS_TARGET="/truststore/gravitino.jks"
        CA_CERT="/certs/ca.crt"
        ALIAS="keycloak-ca"
        STOREPASS="changeit"

        echo "=== Copying default JRE cacerts ==="
        # Tìm cacerts trong JRE hiện tại
        CACERTS=$(find /opt/java -name "cacerts" 2>/dev/null | head -1)
        if [ -z "${CACERTS}" ]; then
          CACERTS=$(find /usr -name "cacerts" 2>/dev/null | head -1)
        fi
        echo "Found cacerts: ${CACERTS}"
        cp "${CACERTS}" "${JKS_TARGET}"
        chmod 644 "${JKS_TARGET}"

        echo "=== Importing Keycloak CA cert ==="
        keytool -importcert \
          -alias "${ALIAS}" \
          -file "${CA_CERT}" \
          -keystore "${JKS_TARGET}" \
          -storepass "${STOREPASS}" \
          -storetype JKS \
          -noprompt
        echo "=== Import thành công ==="
        keytool -list -keystore "${JKS_TARGET}" -storepass "${STOREPASS}" | grep "${ALIAS}"
    volumeMounts:
      - name: truststore
        mountPath: /truststore
      - name: keycloak-ca-cert
        mountPath: /certs
        readOnly: true
