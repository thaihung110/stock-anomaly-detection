---
# Secret 'llm-agent-secret' must be created manually before deploying:
#
#   kubectl create secret generic llm-agent-secret \
#     -n stock-anomaly-detection \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     --from-literal=ICEBERG_OAUTH2_CREDENTIAL="<client_id>:<client_secret>" \
#     --from-literal=S3_ACCESS_KEY_ID="<minio_access_key>" \
#     --from-literal=S3_SECRET_ACCESS_KEY="<minio_secret_key>"
#
# To switch to Gemini: replace OPENAI_API_KEY with GOOGLE_API_KEY and
# change LLM_MODEL in the ConfigMap to "google_genai:gemini-2.5-flash-lite".
#
# Rollback at any time (no llm-agent restart needed):
#   kubectl set env deploy/alert-service DELIVERY_SOURCE=raw -n stock-anomaly-detection
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-agent-config
  namespace: stock-anomaly-detection
data:
  KAFKA_BOOTSTRAP_SERVERS: "openhouse-kafka:9092"
  KAFKA_INPUT_TOPIC: "alerts.raw"
  KAFKA_CONSUMER_GROUP: "llm-agent"
  KAFKA_OUTPUT_TOPIC: "alerts.confirmed"
  KAFKA_FOLLOWUP_TOPIC: "alerts.followup"

  # LLM provider — change only this to switch provider (zero code change):
  #   "openai:gpt-4o-mini"                  (current, cost-efficient)
  #   "openai:gpt-4o"                        (upgrade for ambiguous cases)
  #   "google_genai:gemini-2.5-flash-lite"   (Gemini alternative)
  #   "anthropic:claude-haiku-4-5"           (Anthropic alternative)
  LLM_MODEL: "openai:gpt-4o-mini"
  LLM_ESCALATION_MODEL: ""

  # Bronze catalog — raw.raw_news_articles (Finnhub streaming, ~30s lag)
  BRONZE_CATALOG_NAME: "bronze"
  BRONZE_WAREHOUSE: "bronze"
  NEWS_TABLE: "raw.raw_news_articles"
  NEWS_LOOKBACK_HOURS: "6"

  # Silver catalog — normalized.news_clean (NewsAPI batch, cleaned + deduped)
  SILVER_CATALOG_NAME: "silver"
  SILVER_WAREHOUSE: "silver"
  NEWS_DIGEST_TABLE: "normalized.news_clean"
  NEWS_LOOKBACK_DAYS: "3"
  NEWS_TOP_K: "8"

  # Shared Iceberg REST catalog config (same Gravitino instance, different warehouses)
  ICEBERG_CATALOG_URI: "http://openhouse-gravitino:9001/iceberg/"
  ICEBERG_OAUTH2_SERVER_URI: "http://openhouse-keycloak/realms/iceberg/protocol/openid-connect/token"
  ICEBERG_OAUTH2_SCOPE: "gravitino"

  S3_ENDPOINT: "http://openhouse-minio:9000"
  S3_REGION: "us-east-1"
  S3_PATH_STYLE_ACCESS: "true"

  # Decoupling safety
  AGENT_TTL_SEC: "8"
  CB_FAILURE_THRESHOLD: "5"
  CB_RECOVERY_TIMEOUT_SEC: "60"
  DEDUP_CACHE_TTL_SEC: "900"

  # Follow-up re-check
  RECHECK_ENABLED: "true"
  RECHECK_DELAY_MIN: "20"
  RECHECK_QUEUE_MAX_SIZE: "1000"

  HTTP_PORT: "8081"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-agent
  namespace: stock-anomaly-detection
  labels:
    app: llm-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-agent
  template:
    metadata:
      labels:
        app: llm-agent
    spec:
      containers:
        - name: llm-agent
          image: hungvt0110/llm-agent:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: llm-agent-config
            - secretRef:
                name: llm-agent-secret
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: llm-agent
  namespace: stock-anomaly-detection
  labels:
    app: llm-agent
spec:
  selector:
    app: llm-agent
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
