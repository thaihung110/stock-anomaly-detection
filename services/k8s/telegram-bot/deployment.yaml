---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegram-bot-config
  namespace: stock-anomaly-detection
data:
  # Patch this value after starting ngrok:
  #   kubectl patch configmap telegram-bot-config -n stock-anomaly-detection \
  #     --type merge -p '{"data":{"WEBHOOK_HOST":"https://<ngrok-url>.ngrok-free.dev"}}'
  WEBHOOK_HOST: "https://choosing-eastward-unsliced.ngrok-free.dev"
  WEBHOOK_PATH: "/webhook"
  APP_PORT: "8080"
  PG_HOST: "openhouse-postgresql-primary"
  PG_PORT: "5432"
  PG_DATABASE: "stock_anomaly"
  PG_USER: "stock_user"
  RULE_ENGINE_URL: "http://rule-engine:8080"
  # Phase 3 — alert-service URL for cache reload after watchlist/preference mutations
  ALERT_SERVICE_URL: "http://alert-service:8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-bot
  namespace: stock-anomaly-detection
  labels:
    app: telegram-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      containers:
        - name: telegram-bot
          image: hungvt0110/telegram-bot:v0.3
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: telegram-bot-config
            - secretRef:
                name: telegram-bot-secret
          env:
            - name: PG_DSN
              value: "postgresql://$(PG_USER):$(PG_PASSWORD)@$(PG_HOST):$(PG_PORT)/$(PG_DATABASE)"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: telegram-bot
  namespace: stock-anomaly-detection
spec:
  selector:
    app: telegram-bot
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telegram-bot-ingress
  namespace: stock-anomaly-detection
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /webhook
            pathType: Prefix
            backend:
              service:
                name: telegram-bot
                port:
                  number: 8080
# Secret 'telegram-bot-secret' must be created manually before deploying:
#   kubectl create secret generic telegram-bot-secret \
#     -n stock-anomaly-detection \
#     --from-literal=TELEGRAM_BOT_TOKEN="<bot_token>" \
#     --from-literal=PG_PASSWORD="<pg_password>"
