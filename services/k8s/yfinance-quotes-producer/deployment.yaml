apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: stock-anomaly-detection
  name: yfinance-quotes-producer
  labels:
    app: yfinance-quotes-producer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yfinance-quotes-producer
  template:
    metadata:
      labels:
        app: yfinance-quotes-producer
    spec:
      terminationGracePeriodSeconds: 30
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z openhouse-kafka 9092; do
                echo "waiting for kafka..."; sleep 3
              done
              echo "kafka is ready"
      containers:
        - name: yfinance-quotes-producer
          image: hungvt0110/yfinance-quotes-producer:v0.2
          imagePullPolicy: Always
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "openhouse-kafka:9092"
            - name: KAFKA_TOPIC
              value: "raw.stock.quotes"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
