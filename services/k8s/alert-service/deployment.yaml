---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-service-config
  namespace: stock-anomaly-detection
data:
  KAFKA_BOOTSTRAP_SERVERS: "openhouse-kafka:9092"
  # LLM agent ON — consume from alerts.confirmed (ConfirmedAlertEvent + AI block).
  # ADR-002 lifted: llm-agent is deployed and publishing to alerts.confirmed.
  # Rollback: set KAFKA_INPUT_TOPIC=alerts.raw AND DELIVERY_SOURCE=raw, then apply.
  KAFKA_INPUT_TOPIC: "alerts.confirmed"
  KAFKA_CONSUMER_GROUP: "alert-service-confirmed"
  KAFKA_USER_ALERT_TOPIC: "alerts.user"
  KAFKA_USER_CONSUMER_GROUP: "alert-service-user"
  # Stage A — LLM integration flags
  # DELIVERY_SOURCE controls formatter + judgement_writer:
  #   "raw"       → format_message(AlertEvent), no judgement write
  #   "confirmed" → format_confirmed_message(ConfirmedAlertEvent), write anomaly_judgement
  DELIVERY_SOURCE: "confirmed"
  KAFKA_CONFIRMED_TOPIC: "alerts.confirmed"
  KAFKA_CONFIRMED_CONSUMER_GROUP: "alert-service-confirmed"
  KAFKA_FOLLOWUP_TOPIC: "alerts.followup"
  KAFKA_FOLLOWUP_CONSUMER_GROUP: "alert-service-followup"
  ICEBERG_CATALOG_NAME: "stock_catalog"
  ICEBERG_CATALOG_URI: "http://openhouse-gravitino:9001/iceberg/"
  ICEBERG_OAUTH2_SERVER_URI: "http://openhouse-keycloak/realms/iceberg/protocol/openid-connect/token"
  ICEBERG_OAUTH2_SCOPE: "gravitino"
  ICEBERG_WAREHOUSE: "gold"
  FACT_ALERT_HISTORY_TABLE: "gold.fact_alert_history"
  ANOMALY_JUDGEMENT_TABLE: "gold.anomaly_judgement"
  S3_ENDPOINT: "http://openhouse-minio:9000"
  S3_REGION: "us-east-1"
  S3_PATH_STYLE_ACCESS: "true"
  # Phase 3 — fan-out feature flag (must be "true" for multi-user delivery)
  ENABLE_FANOUT: "true"
  SUBSCRIBER_CACHE_TTL_SEC: "60"
  # PostgreSQL connection (required when ENABLE_FANOUT=true)
  PG_HOST: "openhouse-postgresql-primary"
  PG_PORT: "5432"
  PG_DATABASE: "stock_anomaly"
  PG_USER: "stock_user"
---
apiVersion: v1
kind: Service
metadata:
  name: alert-service
  namespace: stock-anomaly-detection
  labels:
    app: alert-service
spec:
  selector:
    app: alert-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alert-service
  namespace: stock-anomaly-detection
  labels:
    app: alert-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alert-service
  template:
    metadata:
      labels:
        app: alert-service
    spec:
      containers:
        - name: alert-service
          image: hungvt0110/alert-service:v0.8
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: alert-service-config
            - secretRef:
                name: alert-service-secret
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
# Secret 'alert-service-secret' must be created manually before deploying:
#   kubectl create secret generic alert-service-secret \
#     -n stock-anomaly-detection \
#     --from-literal=TELEGRAM_BOT_TOKEN="<bot_token>" \
#     --from-literal=TELEGRAM_CHAT_ID="<chat_id>" \
#     --from-literal=ICEBERG_OAUTH2_CREDENTIAL="<client_id>:<client_secret>" \
#     --from-literal=S3_ACCESS_KEY_ID="<minio_access_key>" \
#     --from-literal=S3_SECRET_ACCESS_KEY="<minio_secret_key>" \
#     --from-literal=PG_PASSWORD="<pg_password>"
